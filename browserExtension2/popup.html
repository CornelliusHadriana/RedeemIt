<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ReedemIt</title>
    <style>
      body {
        width: 300px;
        padding: 16px;
        font-family: sans-serif;
      }

      h1 {
        font-size: 18px;
        margin-bottom: 4px;
      }

      p.subtitle {
        font-size: 12px;
        color: #888;
        margin-bottom: 16px;
      }

      .card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .card-logo {
        width: 24px;
        height: 24px;
        object-fit: contain;
        border-radius: 4px;
      }

      .card-brand {
        font-weight: bold;
        font-size: 15px;
      }

      .card-balance {
        font-size: 13px;
        color: #333;
        margin-bottom: 2px;
      }

      .card-expiry {
        font-size: 11px;
        color: #888;
        margin-bottom: 10px;
      }

      button {
        width: 100%;
        padding: 8px;
        background: #2ecc71;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }

      button:hover {
        background: #27ae60;
      }
    </style>
  </head>
  <body>

    <h1>🎁 ReedemIt</h1>
    <p class="subtitle">Your gift cards</p>

    <div id="cards-list"></div>

    <script src="popup.js"></script>
  </body>
</html>
